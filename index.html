<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Expense & Budget Visualizer</h1>

  <div id="balance-box">
    <p>Total Balance</p>
    <h2 id="balance-amount">Rp 0</h2>
  </div>

  <div class="card">
    <h3>Add Transaction</h3>
    <form id="transaction-form">

      <label for="item-name">Item Name</label>
      <input type="text" id="item-name" placeholder="Example: Nasi Goreng">

      <label for="item-amount">Amount</label>
      <input type="number" id="item-amount" placeholder="Example: 15000">

      <label for="item-category">Category</label>
      <select id="item-category">
        <option value="">-- Choose Category --</option>
      </select>

      <label for="item-date">Date</label>
      <input type="date" id="item-date">

      <p id="error-message"></p>

      <button type="submit">Add Transaction</button>
    </form>
  </div>

  <div class="card">
    <h3>Add New Category</h3>
    <label for="new-category-input">Category Name</label>
    <input type="text" id="new-category-input" placeholder="Example: Shopping">
    <p id="category-error-message"></p>
    <button type="button" id="add-category-btn">Add Category</button>
  </div>

  <div class="card">
    <div class="list-header">
      <h3>Spending by Category</h3>
      <select id="chart-range">
        <option value="month">This Month</option>
        <option value="year">This Year</option>
        <option value="all">All Time</option>
      </select>
    </div>
    <canvas id="category-chart"></canvas>
  </div>

  <div class="card">
    <h3>Monthly Summary</h3>
    <ul id="monthly-summary-list">
    </ul>
  </div>

  <div class="card">
    <div class="list-header">
      <h3>Transaction History</h3>
      <select id="sort-select">
        <option value="none">Sort: Newest First</option>
        <option value="amount-high">Sort: Amount (High to Low)</option>
        <option value="amount-low">Sort: Amount (Low to High)</option>
        <option value="category">Sort: Category (A-Z)</option>
      </select>
    </div>
    <ul id="transaction-list">
    </ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
